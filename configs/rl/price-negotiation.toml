model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 10
batch_size = 16
rollouts_per_example = 4
# trajectory_strategy = "interleaved"  # or "branching"
# learning_rate = 1e-4
# lora_alpha = 16
# oversampling_factor = 2.0
# max_async_level = 2
env_file = ["../../.env"] # optional file(s) for keys/secrets

[sampling]
max_tokens = 512

[[env]]
id = "vidit/buyer-seller"

